name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "playwright.config.ts"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:frontend

      - name: Unit tests
        run: npm run test:frontend

      - name: Build
        run: npm run build:frontend
